name: Build and deploy Aseprite

on:
  schedule:
    - cron: '0 0 * * *'
  push:
    branches:
      - main

env:
  BUILD_TYPE: Release

jobs:
  check-version:
    name: Check latest Aseprite release
    runs-on: ubuntu-latest
    outputs:
      download_url: ${{ steps.version_info.outputs.download_url }}
      latest_tag: ${{ steps.version_info.outputs.latest_tag }}
      should_build: ${{ steps.should_build.outputs.should_build }}

    steps:
      - name: Get latest version info
        id: version_info
        run: |
          data=$(curl -sL https://api.github.com/repos/aseprite/aseprite/releases/latest)

          LATEST_TAG=$(echo "$data" | jq -r '.tag_name')
          DOWNLOAD_URL=$(echo "$data" | jq -r '.assets[].browser_download_url')
          VERSION_INFO=$(echo "$data" | jq -r '.body')

          echo "$LATEST_TAG" > latest_tag.txt

          echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT
          echo "download_url=$DOWNLOAD_URL" >> $GITHUB_OUTPUT
          echo "version_info<<EOF" >> $GITHUB_OUTPUT
          echo "$VERSION_INFO" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Load version from cache
        id: version_check
        uses: actions/cache@v4
        with:
          path: latest_tag.txt
          key: cached_version

      - name: Should we start new build?
        id: should_build
        run: |
          if [ "${{ steps.version_check.outputs.cache-hit }}" != "true" ]; then
            echo "should_build=true" >> $GITHUB_OUTPUT
          else
            echo "should_build=false" >> $GITHUB_OUTPUT
          fi

  build-aseprite:
    name: Build Aseprite
    needs: check-version
    if: ${{ needs.check-version.outputs.should_build == 'true' }}
    runs-on: windows-latest

    steps:
      - name: Setup Ninja
        uses: seanmiddleditch/gha-setup-ninja@v1

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Get Skia cache
        id: skia-cache
        uses: actions/cache@v4
        with:
          path: skia
          key: skia-windows-cache

      - name: Download Skia
        if: steps.skia-cache.outputs.cache-hit != 'true'
        run: |
          curl -L -o skia.zip https://github.com/aseprite/skia/releases/download/m81-b607b32047/Skia-Windows-Release-x64.zip
          tar -xf skia.zip -C .

      - name: Download Aseprite source
        run: |
          curl -L -o aseprite.zip ${{ needs.check-version.outputs.download_url }}
          tar -xf aseprite.zip
          mkdir aseprite/build

      - name: Configure CMake
        working-directory: aseprite/build
        run: |
          cmake -G Ninja ^
          -DCMAKE_BUILD_TYPE=Release ^
          -DLAF_BACKEND=skia ^
          -DSKIA_DIR=../../skia ^
          -DSKIA_LIBRARY_DIR=../../skia/out/Release-x64 ^
          ..

      - name: Build
        working-directory: aseprite/build
        run: ninja aseprite

      - name: Prepare zip
        working-directory: aseprite/build/bin
        run: |
          echo.> aseprite.ini
          7z a Aseprite.zip *

      - name: Upload release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check-version.outputs.latest_tag }}
          name: Aseprite ${{ needs.check-version.outputs.latest_tag }}
          files: aseprite/build/bin/Aseprite.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
